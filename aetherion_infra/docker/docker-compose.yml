version: '3.8'

services:
  # Consensus & Event Streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Relational / Accounting & Economics Domains
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aetherion_admin
      POSTGRES_PASSWORD: vault_injected_password
      POSTGRES_DB: aetherion_ledger
    ports:
      - "5432:5432"

  # Wide-Column / High-Velocity Telemetry
  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "AetherionCluster"

  # Document / Offline-First Sync
  couchdb:
    image: couchdb:latest
    environment:
      COUCHDB_USER: aetherion_admin
      COUCHDB_PASSWORD: vault_injected_password
    ports:
      - "5984:5984"

  # Secrets Management
  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "aetherion-dev-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
